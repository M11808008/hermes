    <h1>欒斌教授個人簡介</h1>
    <p>欒斌教授 (Luarn-Pin) 現任國立臺灣科技大學企業管理系教授，並於 2024 年榮獲師鐸獎肯定。</p>
    <h2>研究領域</h2>
    <ul>
        <li>人工智慧應用與科技展望</li>
        <li>資訊管理</li>
        <li>技術管理與創新</li>
    </ul>
    <h2>學術表現</h2>
    <p>欒斌教授在人工智慧領域深耕數十年，關注 AI 訓練模型的效能、耗能議題以及相關的資安規範完善。他致力於推動 AI 技術的全面化應用，並強調 AI 與專業領域知識結合的重要性。</p>
    <p>更多學術論文與引用詳見：<a href="https://scholar.google.com/citations?user=n6eT-pMAAAAJ">Google Scholar</a></p>
